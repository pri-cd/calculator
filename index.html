<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>

<body>
    <div id="header" class="header">
        <div id="header" class="logo"></div>
        <div id="title" class="title">Calculator</div>
    </div>

    <div id="calculator" class="calculator">
        <div class="calculationSpace"></div>
        <div class="rowKeysContainer">
            <button id="clearCalcButton" class="clearCalc"><img src="./assets/resources/del.svg" alt=""></button>
            <button id="percentage" class="percentage"><img src="./assets/resources/percent.svg" alt=""></button>
            <button id="backspace" class="backspace"><img src="./assets/resources/bkspc.svg" alt=""></button>
            <button id="divide" class="divide"><img src="./assets/resources/div.svg" alt=""></button>
        </div>
        <div class="rowKeysContainer">
            <button id="number7" class="number">7</button>
            <button id="number8" class="number">8</button>
            <button id="number9" class="number">9</button>
            <button id="multiply" class="multiply"><img src="./assets/resources/mul.svg" alt=""></button>
        </div>
        <div class="rowKeysContainer">
            <button id="number4" class="number">4</button>
            <button id="number5" class="number">5</button>
            <button id="number6" class="number">6</button>
            <button id="addition" class="addition"><img src="./assets/resources/add.svg" alt=""></button>
        </div>
        <div class="rowKeysContainer">
            <button id="number1" class="number">1</button>
            <button id="number2" class="number">2</button>
            <button id="number3" class="number">3</button>
            <button id="subtract" class="subtract"><img src="./assets/resources/sub.svg" alt=""></button>
        </div>
        <div class="rowKeysContainer">
            <button id="number0" class="number">0</button>
            <button id="deciman" class="decimal">.</button>
            <button id="equal" class="equal"><img src="./assets/resources/equal.svg" alt=""></button>
        </div>
    </div>

    <div class="footer"> Support my GitHub, Or visit more projects!</div>
</body>

</html>
