<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="shortcut icon" href="./assets/resources/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="./assets/styles.css">
    <script src="./assets/script.js" defer></script>
</head>

<body>
    <div id="header" class="header">
        <div id="logo" class="logo"><img src="./assets/resources/logo.png" alt=""></div>
        <div id="title" class="title">Calculator</div>
    </div>

    <div id="calculatorContainer" class="calculatorContainer">
        <div id="calculator" class="calculator">
            <div id="calculationSpace" class="calculationSpace"></div>
            <div class="rowKeysContainer">
                <button id="clearCalcButton" class="clearCalc button"><img src="./assets/resources/del.svg" alt=""></button>
                <button id="GitHub" class="GitHub button"><img src="./assets/resources/G.png" alt=""></button>
                <button id="backspace" class="backspace button"><img src="./assets/resources/bkspc.svg" alt=""></button>
                <button id="divide" class="divide button"><img src="./assets/resources/div.svg" alt=""></button>
            </div>
            <div class="rowKeysContainer">
                <button id="number7" class="number button">7</button>
                <button id="number8" class="number button">8</button>
                <button id="number9" class="number button">9</button>
                <button id="multiply" class="multiply button"><img src="./assets/resources/mul.svg" alt=""></button>
            </div>
            <div class="rowKeysContainer">
                <button id="number4" class="number button">4</button>
                <button id="number5" class="number button">5</button>
                <button id="number6" class="number button">6</button>
                <button id="addition" class="addition button"><img src="./assets/resources/add.svg" alt=""></button>
            </div>
            <div class="rowKeysContainer">
                <button id="number1" class="number button">1</button>
                <button id="number2" class="number button">2</button>
                <button id="number3" class="number button">3</button>
                <button id="subtract" class="subtract button"><img src="./assets/resources/sub.svg" alt=""></button>
            </div>
            <div class="rowKeysContainer">
                <button id="number0" class="number button0">0</button>
                <!-- For better formatting/styling  -->
                <div class="lastRowElement"> 
                    <button id="decimal" class="decimal button">.</button>
                    <button id="equal" class="equal button"><img src="./assets/resources/equal.svg" alt=""></button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer"> Support my GitHub, Or visit more projects!</div>
</body>

</html>
